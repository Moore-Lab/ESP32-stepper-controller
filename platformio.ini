; PlatformIO Project Configuration File
; ESP32-S3 Motion Control - Dual Loop Linear Stage

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; Set CPU frequency to 240MHz for high-speed PID/Encoder processing
board_build.f_cpu = 240000000L

; Hardware-specific: Enable Native USB for Serial debugging
build_flags = 
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1

; Library Dependencies
lib_deps =
    madhephaestus/ESP32Encoder @ ^0.10.1    ; Hardware-accelerated pulse counting
    gin66/FastAccelStepper @ ^0.30.15      ; Jitter-free stepper pulse generation
    br3ttb/PID @ ^1.2.1                    ; Standard PID library for error correction

; Serial Monitor Settings
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, time, send_on_enter